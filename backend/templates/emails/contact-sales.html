<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Nuevo mensaje de contacto</title>
    <style>
      body {
        font-family: sans-serif;
        background-color: #1c5c9c;
        margin: 0;
        padding: 0;
      }
      .container {
        background-color: #ffffff;
        max-width: 600px;
        margin: 0 auto;
        padding: 0;
      }
      .heading {
        background-color: #1c5c9c;
        color: #ffffff;
        font-size: 1rem;
        font-weight: bold;
        text-align: center;
        padding: 1rem 0;
        margin-bottom: 1rem;
      }
      .field {
        color: #374151;
        margin: 0.5rem 1rem;
        font-size: 1rem;
      }
      .field strong {
        font-weight: bold;
        color: #111827;
      }
      .message {
        background-color: #f9fafb;
        border: 1px solid #1c5c9c;
        border-radius: 0.375rem;
        padding: 1rem;
        margin: 1rem;
        color: #374151;
        font-size: 1rem;
      }
      .footer {
        color: #4b5563;
        font-size: 0.8rem;
        margin: 1rem;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="heading">🚀 Nuevo mensaje desde la página</div>

      <p class="field"><strong>🎯 Nombre:</strong> {{fullname}}</p>
      <p class="field"><strong>📧 Correo:</strong> {{email}}</p>
      <p class="field"><strong>📞 Teléfono:</strong> {{phone}}</p>
      <p class="field"><strong>⭐ Asunto:</strong> {{reason}}</p>

      <div class="message">
        <strong>✨ Mensaje:</strong><br />
        {{message}}
      </div>

      <p class="footer">📧 Este correo fue generado automáticamente.</p>
    </div>
  </body>
</html>
