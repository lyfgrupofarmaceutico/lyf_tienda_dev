<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Respuesta automática</title>
    <style>
      body {
        font-family: sans-serif;
        background-color: #f3f4f6;
        margin: 0;
        padding: 0;
      }
      .container {
        background-color: #ffffff;
        max-width: 600px;
        margin: 0 auto;
        padding: 0;
      }
      .heading {
        background-color: #1c5c9c;
        color: #ffffff;
        font-size: 1rem;
        font-weight: bold;
        text-align: center;
        padding: 1rem 0;
        margin-bottom: 1rem;
      }
      .text {
        color: #374151;
        margin: 0.5rem 1rem;
        padding-top: 0.8rem;
        font-size: 1rem;
      }
      .text strong {
        font-weight: bold;
      }
      .text-secondary {
        color: #4b5563;
        margin: 1rem;
        text-align: center;
        font-size: 0.8rem;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="heading">🚀 ¡Gracias por contactarnos!</div>
      <p class="text">👋 Hola <strong>{{fullname}}</strong>,</p>
      <p class="text">
        Revisaremos tu mensaje con toda la atención que merece. Nos pondremos en
        contacto contigo lo mas pronto posible 🚀.
      </p>
      <p class="text">Un cordial saludo,</p>
      <p class="text">
        Marly Tatiana Victoria Urrutia <br />
        <span style="font-weight: bold">Gerente Comercial</span>
      </p>
      <p class="text-secondary">📧 Este correo fue generado automáticamente.</p>
    </div>
  </body>
</html>
